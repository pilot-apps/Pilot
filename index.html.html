<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pilot-Hjælp">
<title>Pilot-Hjælp</title>
<link rel="manifest" href="manifest.json">

<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');
:root{
  --bg:#f5f3ef;--surface:#fff;--dark:#1a1a2e;--accent:#e8a020;
  --red:#c0392b;--text:#1a1a2e;--muted:#6b7280;--border:#e2ddd6;
  --tag:#eef2ff;--tag-t:#3730a3;--radius:10px;
  --sat:env(safe-area-inset-top);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overscroll-behavior:none}

/* TOPBAR */
.topbar{background:var(--dark);color:#fff;padding:13px 16px;padding-top:calc(13px + env(safe-area-inset-top));display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:100}
.logo{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:16px;color:var(--accent);letter-spacing:-0.3px;white-space:nowrap}
.topbar-title{font-size:13px;font-weight:500;color:rgba(255,255,255,.7);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.back{background:rgba(255,255,255,.12);border:none;color:#fff;padding:6px 11px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:12px;cursor:pointer;display:none;align-items:center;gap:5px;white-space:nowrap;flex-shrink:0}
.back.on{display:flex}.back:active{opacity:.7}

/* SEARCH */
.search-wrap{padding:10px 14px;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:53px;z-index:90}
.si{position:relative}
.si input{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--border);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;background:#fff;outline:none;-webkit-appearance:none;transition:border-color .15s}
.si input:focus{border-color:var(--accent)}
.si::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:13px;pointer-events:none}

/* BREADCRUMB */
.bc{padding:6px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);display:flex;gap:4px;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);min-height:30px;background:var(--bg)}
.bc-item{cursor:pointer;text-decoration:underline;text-underline-offset:2px}.bc-item:active{opacity:.6}

/* MAIN */
.main{padding:10px 14px 100px}

/* SECTION LABEL */
.sec-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:10px 0 6px}

/* CARDS */
.card-grid{display:flex;flex-direction:column;gap:7px}
.card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 14px;cursor:pointer;display:flex;align-items:center;gap:11px;transition:border-color .15s;-webkit-user-select:none;user-select:none}
.card:active{border-color:var(--accent);background:#fffbf5}
.card.arr::after{content:'›';color:var(--muted);font-size:20px;margin-left:auto;font-weight:300}
.ci{font-size:18px;width:36px;height:36px;background:var(--tag);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cb{flex:1;min-width:0}
.ct{font-weight:600;font-size:14px;line-height:1.3}
.cs{font-size:12px;color:var(--muted);margin-top:2px}
.badge{background:var(--dark);color:var(--accent);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;padding:3px 8px;border-radius:5px;flex-shrink:0;white-space:nowrap}

/* CONTENT CARD */
.cc{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.ch{background:var(--dark);color:#fff;padding:12px 14px;display:flex;align-items:flex-start;gap:9px}
.ch-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.ch-title{font-weight:600;font-size:14px}
.ch-sub{font-size:11px;opacity:.6;margin-top:2px}
.cb2{padding:14px}
.shop-entry{padding:10px 0;border-bottom:1px solid var(--border)}
.shop-entry:last-child{border-bottom:none}
.sn{font-weight:600;font-size:14px;margin-bottom:3px}
.sa{font-size:12px;color:var(--muted);margin-bottom:6px}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:3px 7px;border-radius:5px}
.tag-h{background:var(--tag);color:var(--tag-t)}
.tag-l{background:#fef3c7;color:#92400e}
.tag-a{background:#dcfce7;color:#166534}
.zip-lbl{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:var(--red);margin-bottom:2px}
.route-time{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:11px;background:var(--dark);color:var(--accent);padding:2px 7px;border-radius:4px;font-weight:700}
.rtype{display:inline-block;font-size:11px;padding:2px 6px;border-radius:4px;font-weight:600;margin-left:4px}
.fast{background:#dcfce7;color:#166534}
.ringer{background:#fef3c7;color:#92400e}
.speciel{background:#ede9fe;color:#5b21b6}
.lc{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:13px 14px;display:flex;align-items:center;gap:11px;margin-bottom:7px;text-decoration:none;color:inherit;-webkit-user-select:none;user-select:none}
.lc:active{border-color:var(--accent)}
.lc-icon{font-size:19px;width:36px;height:36px;background:var(--tag);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lc-cred{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--accent);margin-top:2px}
.step-num{width:26px;height:26px;background:var(--dark);color:var(--accent);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;flex-shrink:0}
.port-tag{font-family:'IBM Plex Mono',monospace;font-size:11px;background:#f1f5f9;color:#475569;padding:2px 6px;border-radius:4px;margin-left:5px}
.no-results{text-align:center;padding:40px 16px;color:var(--muted);font-size:14px}
.sr-sec{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);padding:10px 0 6px;border-top:1px solid var(--border);margin-top:10px}
.sr-sec:first-child{border-top:none;margin-top:0}

/* INSTALL BANNER */
.install-banner{position:fixed;bottom:0;left:0;right:0;background:var(--dark);padding:14px 16px;padding-bottom:calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;gap:12px;z-index:200;border-top:2px solid var(--accent);box-shadow:0 -4px 20px rgba(0,0,0,.3)}
.install-banner.hidden{display:none}
.install-logo{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:14px;color:var(--accent)}
.install-text{flex:1;color:#fff;font-size:13px;line-height:1.3}
.install-text small{color:rgba(255,255,255,.5);font-size:11px;display:block;margin-top:1px}
.install-btn{background:var(--accent);color:var(--dark);border:none;padding:8px 14px;border-radius:7px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.install-btn:active{opacity:.8}
.install-close{background:none;border:none;color:rgba(255,255,255,.4);font-size:20px;cursor:pointer;padding:0 4px;flex-shrink:0;line-height:1}
.install-close:active{color:#fff}

/* ADMIN PANEL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.modal-bg.hidden{display:none}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;padding:20px 16px 40px}
.modal-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-title{font-weight:700;font-size:16px}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted)}
.form-group{margin-bottom:14px}
.form-label{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;display:block;margin-bottom:5px}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-family:'IBM Plex Sans',sans-serif;font-size:14px;outline:none;-webkit-appearance:none;background:#fff}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-textarea{min-height:80px;resize:vertical;line-height:1.4}
.btn-primary{background:var(--dark);color:var(--accent);border:none;padding:12px 20px;border-radius:8px;font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;width:100%;margin-top:6px}
.btn-primary:active{opacity:.8}
.btn-danger{background:#fee2e2;color:#dc2626;border:none;padding:8px 14px;border-radius:7px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;cursor:pointer}
.custom-section-list{margin-top:16px;display:flex;flex-direction:column;gap:8px}
.custom-item{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:11px 13px;display:flex;align-items:center;gap:10px}
.custom-item-body{flex:1;min-width:0}
.custom-item-name{font-weight:600;font-size:14px}
.custom-item-sub{font-size:12px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ADMIN FAB */
.fab{position:fixed;bottom:calc(16px + env(safe-area-inset-bottom));right:16px;background:var(--dark);color:var(--accent);border:none;width:46px;height:46px;border-radius:50%;font-size:20px;cursor:pointer;z-index:150;box-shadow:0 3px 14px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center}
.fab:active{opacity:.8}
.fab.with-banner{bottom:calc(74px + env(safe-area-inset-bottom))}

/* ADMIN TABS */
.atab{background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:6px 12px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;color:var(--muted);}
.atab.active{background:var(--dark);color:var(--accent);border-color:var(--dark);}
.atab:active{opacity:.7}
</style>
</head>

<div class="topbar">
  <button class="back" id="backBtn" onclick="goBack()">← Tilbage</button>
  <div class="logo">Pilot-Hjælp</div>
  <div class="topbar-title" id="topTitle"></div>
</div>

<div class="search-wrap">
  <div class="si"><input id="searchInput" type="search" placeholder="Søg butik, rute, tid..." oninput="handleSearch(this.value)" autocomplete="off"></div>
</div>

<div class="bc" id="bc"></div>
<div class="main" id="main"></div>

<!-- Install Banner -->
<div class="install-banner hidden" id="installBanner">
  <div class="install-logo">📲</div>
  <div class="install-text">
    Installer Pilot-Hjælp
    <small>Tilføj til startskærm for hurtig adgang</small>
  </div>
  <button class="install-btn" id="installBtn" onclick="doInstall()">Installer</button>
  <button class="install-close" onclick="dismissInstall()">×</button>
</div>

<!-- Admin Modal -->
<div class="modal-bg hidden" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-h">
      <div class="modal-title" id="modal-title-text">🔐 Admin Login</div>
      <button class="modal-close" onclick="closeModal(null)">×</button>
    </div>

    <!-- LOGIN VIEW -->
    <div id="loginView">
      <p style="font-size:13px;color:var(--muted);margin-bottom:16px">Indtast admin-kode for at redigere menuer.</p>
      <div class="form-group">
        <label class="form-label">Kode</label>
        <input class="form-input" id="admin-pw" type="password" placeholder="••••••••"
          onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <div id="login-err" style="color:#dc2626;font-size:12px;margin-bottom:10px;min-height:16px"></div>
      <button class="btn-primary" onclick="doLogin()">Log ind</button>
      <p style="font-size:11px;color:var(--muted);margin-top:16px;text-align:center">Chauffører behøver ikke login — al indhold er frit tilgængeligt.</p>
    </div>

    <!-- ADMIN PANEL VIEW -->
    <div id="adminPanelView" class="hidden">
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap" id="adminTabs"></div>
      <div id="adminBody"></div>
      <div style="border-top:1px solid var(--border);margin-top:20px;padding-top:14px">
        <button class="btn-danger" onclick="doLogout()" style="width:100%;padding:10px">🔓 Log ud</button>
      </div>
    </div>
  </div>
</div>

<!-- FAB Admin Button -->
<button class="fab" id="fab" onclick="openModal()" title="Admin / Tilpas menu">⚙️</button>

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); deferredPrompt=e;
  if(!installDismissed && !window.matchMedia('(display-mode: standalone)').matches)
    showInstallBanner();
});
window.addEventListener('appinstalled',()=>{ hideInstallBanner(); });

function showInstallBanner(){
  document.getElementById('installBanner').classList.remove('hidden');
  document.getElementById('fab').classList.add('with-banner');
}
function hideInstallBanner(){
  document.getElementById('installBanner').classList.add('hidden');
  document.getElementById('fab').classList.remove('with-banner');
}
function dismissInstall(){
  installDismissed=true; hideInstallBanner();
  localStorage.setItem('pilot_install_dismissed','1');
}
async function doInstall(){
  if(!deferredPrompt)return;
  deferredPrompt.prompt();
  const r=await deferredPrompt.userChoice;
  deferredPrompt=null;
  if(r.outcome==='accepted') hideInstallBanner();
}
if(localStorage.getItem('pilot_install_dismissed')) installDismissed=true;
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
const isSafari=/^((?!chrome|android).)*safari/i.test(navigator.userAgent);
const isStandalone=window.matchMedia('(display-mode: standalone)').matches||window.navigator.standalone;
if(isIOS && isSafari && !isStandalone && !installDismissed){
  setTimeout(()=>{
    document.getElementById('installBanner').classList.remove('hidden');
    document.getElementById('installBanner').querySelector('.install-text').innerHTML=
      'Installer Pilot-Hjælp<small>Tryk Del → "Føj til hjemmeskærm"</small>';
    document.getElementById('installBtn').style.display='none';
    document.getElementById('fab').classList.add('with-banner');
  },1500);
}

function renderAdminTabs(){
  const tabs=[
    {id:'custom',label:'Mine menuer'},
    {id:'pakkeshop',label:'Pakkeshop'},
    {id:'afhentning',label:'Afhentning'},
    {id:'collection',label:'Collection'},
    {id:'levkontrol',label:'Lev. Kontrol'},
    {id:'saturday',label:'Lørdag'},
    {id:'links',label:'Links'},
    {id:'delivery',label:'Delivery'},
  ];
  document.getElementById('adminTabs').innerHTML=tabs.map(t=>
    `<button class="atab" id="atab-${t.id}" onclick="showAdminTab('${t.id}')">${t.label}</button>`
  ).join('');
}
function showAdminTab(tab){
  document.querySelectorAll('.atab').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById('atab-'+tab);
  if(el) el.classList.add('active');
  const body=document.getElementById('adminBody');
  if(tab==='custom') body.innerHTML=renderAdminCustom();
  else if(tab==='pakkeshop') body.innerHTML=renderAdminPakkeshop();
  else if(tab==='afhentning') body.innerHTML=renderAdminAfhentning();
  else if(tab==='collection') body.innerHTML=renderAdminCollection();
  else if(tab==='levkontrol') body.innerHTML=renderAdminLevKontrol();
  else if(tab==='saturday') body.innerHTML=renderAdminSaturday();
  else if(tab==='links') body.innerHTML=renderAdminLinks();
  else if(tab==='delivery') body.innerHTML=renderAdminDelivery();
}

function renderAdminCustom(){
  const items=getCustom();
  let html=`
<div class="form-group"><label class="form-label">Ikon (emoji)</label><input class="form-input" id="f-icon" placeholder="🚛" maxlength="4"></div>
<div class="form-group"><label class="form-label">Titel</label><input class="form-input" id="f-title" placeholder="f.eks. Specialkunder"></div>
<div class="form-group"><label class="form-label">Beskrivelse</label><input class="form-input" id="f-desc" placeholder="f.eks. 3 kunder"></div>
<div class="form-group"><label class="form-label">Type</label>
<select class="form-select" id="f-type" onchange="toggleTypeFields()">
<option value="link">🔗 Link / URL</option><option value="text">📝 Tekst</option><option value="list">📋 Liste</option>
</select></div>
<div id="field-link" class="form-group"><label class="form-label">URL</label><input class="form-input" id="f-url" type="url" placeholder="https://..."></div>
<div id="field-text" class="form-group hidden"><label class="form-label">Indhold</label><textarea class="form-textarea" id="f-text"></textarea></div>
<div id="field-list" class="form-group hidden"><label class="form-label">Underpunkter (Ikon Titel | Beskrivelse | URL)</label><textarea class="form-textarea" id="f-items" placeholder="🏢 Firma | Adresse | https://..."></textarea></div>
<button class="btn-primary" onclick="saveCustomItem()">➕ Tilføj til menu</button>`;
  if(items.length){
    html+=`<div style="margin-top:20px;font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px">Eksisterende punkter</div>`;
    items.forEach((item,i)=>{
      html+=`<div class="custom-item"><div class="custom-item-body"><div class="custom-item-name">${item.icon} ${item.title}</div><div class="custom-item-sub">${item.type==='link'?item.url:item.type==='list'?`${(item.items||[]).length} underpunkter`:item.content||''}</div></div>
<button class="btn-danger" onclick="deleteCustomItem(${i})">Slet</button></div>`;
    });
  }
  return html;
}
function toggleTypeFields(){
  const t=document.getElementById('f-type').value;
  document.getElementById('field-link').classList.toggle('hidden',t!=='link');
  document.getElementById('field-text').classList.toggle('hidden',t!=='text');
  document.getElementById('field-list').classList.toggle('hidden',t!=='list');
}
function saveCustomItem(){
  const icon=document.getElementById('f-icon').value.trim()||'📋';
  const title=document.getElementById('f-title').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  const type=document.getElementById('f-type').value;
  if(!title){alert('Titel mangler');return;}
  const item={icon,title,desc,type};
  if(type==='link') item.url=document.getElementById('f-url').value.trim();
  else if(type==='text') item.content=document.getElementById('f-text').value.trim();
  else if(type==='list'){
    item.items=document.getElementById('f-items').value.split('\n').filter(Boolean).map(line=>{
      const parts=line.split('|').map(s=>s.trim());
      const first=parts[0]||'';
      const emojiMatch=first.match(/^(\p{Emoji}\s*)/u);
      const emoji=emojiMatch?emojiMatch[1].trim():'🔹';
      const name=emojiMatch?first.slice(emojiMatch[0].length).trim():first;
      return{icon:emoji,title:name,desc:parts[1]||'',url:parts[2]||''};
    });
  }
  const items=getCustom();items.push(item);saveCustom(items);
  render('home',null,'');
  showAdminTab('custom');
  alert('✅ Tilføjet');
}
function deleteCustomItem(i){
  if(!confirm('Slet dette punkt?'))return;
  const items=getCustom();items.splice(i,1);saveCustom(items);
  render('home',null,'');
  showAdminTab('custom');
}

// ── NAVIGATION ─────────────────────────────────────────────────────────
function nav(view,data,label){
  hist.push({view:curView,data:curData,label:document.getElementById('topTitle').textContent});
  curView=view; curData=data;
  document.getElementById('searchInput').value='';
  render(view,data,label); updateNav(label); window.scrollTo(0,0);
}
function goBack(){
  if(!hist.length)return;
  const p=hist.pop(); curView=p.view; curData=p.data;
  document.getElementById('searchInput').value='';
  render(p.view,p.data,p.label); updateNav(p.label); window.scrollTo(0,0);
}
function updateNav(label){
  const btn=document.getElementById('backBtn'),t=document.getElementById('topTitle');
  if(hist.length){btn.classList.add('on');t.textContent=label||'';}
  else{btn.classList.remove('on');t.textContent='';}
  renderBC();
}
function renderBC(){
  const bc=document.getElementById('bc');
  if(!hist.length){bc.innerHTML='';return;}
  bc.innerHTML=hist.map((h,i)=>`<span class="bc-item" onclick="jumpTo(${i})">${h.label||'Hjem'}</span><span>›</span>`).join('')+`<b>${document.getElementById('topTitle').textContent}</b>`;
}
function jumpTo(i){
  const t=hist[i]; hist=hist.slice(0,i); curView=t.view; curData=t.data;
  document.getElementById('searchInput').value='';
  render(t.view,t.data,t.label); updateNav(t.label);
}

    delivery:renderDelivery, quality:renderQuality, links:renderLinks,
    'custom-view':renderCustomView, 'custom-list':renderCustomList,
  };
  m.innerHTML=(map[view]||renderHome)(data);
}

function card(icon,title,sub,onclick,arr,badge){
  return`<div class="card${arr?' arr':''}" onclick="${onclick}"><div class="ci">${icon}</div><div class="cb"><div class="ct">${title}</div>${sub?`<div class="cs">${sub}</div>`:''}</div>${badge!==undefined?`<div class="badge">${badge}</div>`:''}</div>`;
}

// ── HOME ───────────────────────────────────────────────────────────────
function renderHome(){
  const custom=getCustom();
  const ps_shops=Object.values(D.pakkeshop).reduce((a,b)=>a+b.length,0);
  const afh_total=Object.values(D.afhentning).reduce((a,b)=>a+b.length,0);
  let html=`<div class="sec-lbl">GLS Menu</div><div class="card-grid">
${card('🏪','Pakkeshop tider',`${ps_shops} butikker · ${Object.keys(D.pakkeshop).length} områder`,"nav('pakkeshop',null,'Pakkeshop')",true)}
${card('🕐','Pakkeshop Collection',`${D.collection.length} tidsslots`,"nav('collection',null,'Collection')",true)}
${card('🎯','Pakkeshop lev. kontrol',`${D.lev_kontrol.length} leveringstider`,"nav('lev-kontrol',null,'Lev. Kontrol')",true)}
${card('📦','Vognudbring. / Delivery','Deposit · FM-Fuldmagt · Alt. levering',"nav('delivery',null,'Delivery')",true)}
${card('🕜','Afhentning / Pick up',`${Object.keys(D.afhentning).length} ruter · ${afh_total} stop`,"nav('afhentning',null,'Afhentning')",true)}
${card('📅','LørdagsTur / Saturday',`${D.saturday.length} ture med køreplan`,"nav('saturday',null,'LørdagsTur')",true)}
${card('🔍','Kvalitet / Quality','Mandags & Torsdags kvalitet',"nav('quality',null,'Kvalitet')",true)}
${card('🔗','Nyttige Links',`${LINKS.length} links & systemer`,"nav('links',null,'Links')",true)}
${card('📗','Chaufførhåndbog','Google Drive PDF',"window.open('https://drive.google.com/file/d/1LO2XhaWwRr4PjTaUD1NY65MpKe6DOePR/view?usp=drive_link','_blank')",false)}
</div>`;
  if(custom.length){
    html+=`<div class="sec-lbl" style="margin-top:16px">Mine menuer</div><div class="card-grid">`;
    custom.forEach((item,i)=>{
      if(item.type==='list')
        html+=card(item.icon||'📋',item.title,item.desc||`${(item.items||[]).length} punkter`,`nav('custom-list',${i},'${item.title.replace(/'/g,"\'")}')`  ,true);
      else if(item.type==='link')
        html+=card(item.icon||'🔗',item.title,item.desc||item.url,`window.open('${item.url}','_blank')`,false);
      else
        html+=card(item.icon||'📝',item.title,item.desc||'',`nav('custom-view',${i},'${item.title.replace(/'/g,"\'")}')`  ,true);
    });
    html+=`</div>`;
  }
  return html;
}

// ── SEARCH ────────────────────────────────────────────────────────────
function handleSearch(q){
  const m=document.getElementById('main');
  if(!q.trim()){render(curView,curData);return;}
  const ql=q.toLowerCase();let html='';

  const ps=[];
  for(const[area,shops] of Object.entries(D.pakkeshop))
    for(const s of shops)
      if(s.name.toLowerCase().includes(ql)||area.toLowerCase().includes(ql))
        ps.push({area,shop:s});
  if(ps.length){
    html+=`<div class="sr-sec">🏪 Pakkeshop (${ps.length})</div>`;
    html+=ps.map(r=>`<div class="cc" style="margin-bottom:8px"><div class="ch" style="padding:10px 13px"><span class="ch-icon">🏪</span><div><div class="ch-title">${r.shop.name}</div><div class="ch-sub">${r.area}</div></div></div><div class="cb2"><div class="tags">${r.shop.hverdag?`<span class="tag tag-h">Hverdag: ${r.shop.hverdag}</span>`:''} ${r.shop.lørdag?`<span class="tag tag-l">Lørdag: ${r.shop.lørdag}</span>`:''} ${r.shop.afhentning?`<span class="tag tag-a">Afh: ${r.shop.afhentning}</span>`:''}</div></div></div>`).join('');
  }

  const af=[];
  for(const[zip,stops] of Object.entries(D.afhentning))
    for(const s of stops)
      if(s.name.toLowerCase().includes(ql)||s.addr.toLowerCase().includes(ql)||zip.includes(ql))
        af.push({zip,stop:s});
  if(af.length){
    html+=`<div class="sr-sec">📦 Afhentning (${af.length})</div>`;
    html+=af.map(r=>`<div class="card" style="margin-bottom:6px"><div class="ci">📦</div><div class="cb"><div class="ct">${r.stop.name}</div><div class="cs">${r.stop.addr} · Rute ${r.zip}</div></div><div><span class="route-time">${r.stop.time}</span><span class="rtype ${r.stop.type.toLowerCase()}">${r.stop.type}</span></div></div>`).join('');
  }

  const col=[];
  for(const ct of D.collection)
    for(const s of ct.stops)
      if(s.name.toLowerCase().includes(ql)||s.zip.includes(ql)||ct.time.includes(ql))
        col.push({time:ct.time,stop:s});
  if(col.length){
    html+=`<div class="sr-sec">🕐 Collection (${col.length})</div>`;
    html+=col.map(r=>`<div class="card" style="margin-bottom:6px"><div class="ci">🕐</div><div class="cb"><div class="ct">${r.stop.name.split(/DK-/)[0].trim()}</div><div class="cs">${r.stop.zip}</div></div><div class="badge">${r.time}</div></div>`).join('');
  }

  const lk=LINKS.filter(l=>l.name.toLowerCase().includes(ql)||l.desc.toLowerCase().includes(ql));
  if(lk.length){
    html+=`<div class="sr-sec">🔗 Links (${lk.length})</div>`;
    html+=lk.map(l=>`<a href="${l.url}" target="_blank" class="lc" style="margin-bottom:6px"><div class="lc-icon">${l.icon}</div><div style="flex:1"><div class="ct">${l.name}</div><div class="cs">${l.desc}</div></div><span style="color:var(--muted)">↗</span></a>`).join('');
  }

  if(!html)html=`<div class="no-results">Ingen resultater for "<b>${q}</b>"</div>`;
  m.innerHTML=html;
}
